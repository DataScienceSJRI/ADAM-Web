services:
  redis:
    image: redis:7-alpine

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/1
      PLAN_QUEUE_NAME: meal-plans
      PYTHONUNBUFFERED: "1"
    depends_on:
      - redis
    expose:
      - "8000"

  plan-worker:
    build:
      context: ./backend
    command: python -m services.plan_worker
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/1
      PLAN_QUEUE_NAME: meal-plans
      PLAN_JOB_TIMEOUT_SECONDS: "1200"
      PYTHONUNBUFFERED: "1"
    depends_on:
      - redis
